<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Новый счет</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: var(--tg-theme-bg-color, #f5f7fb);
      --text: var(--tg-theme-text-color, #17212b);
      --hint: var(--tg-theme-hint-color, #697386);
      --button: var(--tg-theme-button-color, #2481cc);
      --button-text: var(--tg-theme-button-text-color, #ffffff);
      --surface: var(--tg-theme-secondary-bg-color, #ffffff);
      --border: rgba(23, 33, 43, 0.14);
      --danger: #c2410c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
      line-height: 1.4;
    }

    main {
      width: min(100%, 560px);
      margin: 0 auto;
      padding: 18px 14px 28px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0;
    }

    form {
      display: grid;
      gap: 14px;
    }

    label,
    fieldset {
      display: grid;
      gap: 7px;
      margin: 0;
      padding: 0;
      border: 0;
      font-weight: 600;
    }

    .hint {
      color: var(--hint);
      font-size: 13px;
      font-weight: 500;
    }

    input,
    textarea,
    button {
      font: inherit;
    }

    input,
    textarea {
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 12px;
      background: var(--surface);
      color: var(--text);
      outline: none;
    }

    input:focus,
    textarea:focus {
      border-color: var(--button);
    }

    textarea {
      min-height: 116px;
      resize: vertical;
    }

    .segments {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .segment {
      min-height: 44px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      font-weight: 650;
      cursor: pointer;
    }

    .segment[aria-pressed="true"] {
      border-color: var(--button);
      background: var(--button);
      color: var(--button-text);
    }

    .submit {
      min-height: 48px;
      border: 0;
      border-radius: 8px;
      background: var(--button);
      color: var(--button-text);
      font-weight: 700;
      cursor: pointer;
    }

    .submit:disabled,
    .segment:disabled {
      opacity: 0.64;
      cursor: wait;
    }

    .status {
      min-height: 22px;
      color: var(--hint);
      font-size: 14px;
      font-weight: 600;
    }

    .status.error {
      color: var(--danger);
    }

    @media (min-width: 460px) {
      .segments {
        grid-template-columns: repeat(3, 1fr);
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Новый счет</h1>
    <form id="invoiceForm">
      <label>
        Проект
        <input name="project" autocomplete="off" required placeholder="Например: ABC">
      </label>

      <fieldset>
        <span>Статья расхода</span>
        <div class="segments" role="group" aria-label="Статья расхода">
          <button class="segment" type="button" data-category="Команда" aria-pressed="false">Команда</button>
          <button class="segment" type="button" data-category="Рекламный бюджет" aria-pressed="false">Рекламный бюджет</button>
          <button class="segment" type="button" data-category="Сервисы" aria-pressed="false">Сервисы</button>
        </div>
        <input type="hidden" name="expense_category" required>
      </fieldset>

      <label>
        Кому платим
        <input name="target" autocomplete="off" required placeholder="Имя, компания или сервис">
      </label>

      <label>
        Сумма
        <input name="amount" autocomplete="off" required placeholder="Например: 10000 сом">
      </label>

      <label>
        Дата оплаты
        <input name="payment_due_date" type="date" required>
      </label>

      <label>
        Файл счета
        <input name="file" type="file">
        <span class="hint">Можно отправить без файла, если счет в комментарии.</span>
      </label>

      <label>
        Комментарий
        <textarea name="comment" required placeholder="За что платим, период, реквизиты или другие детали"></textarea>
      </label>

      <button class="submit" type="submit">Отправить счет</button>
      <div id="status" class="status" role="status"></div>
    </form>
  </main>

  <script>
    const tg = window.Telegram && window.Telegram.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    const form = document.querySelector("#invoiceForm");
    const statusNode = document.querySelector("#status");
    const submitButton = form.querySelector(".submit");
    const categoryInput = form.elements.expense_category;
    const paymentDateInput = form.elements.payment_due_date;
    const categoryButtons = Array.from(document.querySelectorAll(".segment"));
    const now = new Date();
    const localToday = new Date(now.getTime() - now.getTimezoneOffset() * 60000)
      .toISOString()
      .slice(0, 10);
    paymentDateInput.min = localToday;

    function setStatus(text, isError = false) {
      statusNode.textContent = text;
      statusNode.classList.toggle("error", isError);
    }

    categoryButtons.forEach((button) => {
      button.addEventListener("click", () => {
        categoryButtons.forEach((item) => item.setAttribute("aria-pressed", "false"));
        button.setAttribute("aria-pressed", "true");
        categoryInput.value = button.dataset.category;
      });
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      if (!categoryInput.value) {
        setStatus("Выберите статью расхода.", true);
        return;
      }

      const formData = new FormData(form);
      formData.append("initData", tg ? tg.initData : "");

      submitButton.disabled = true;
      categoryButtons.forEach((button) => button.disabled = true);
      setStatus("Отправляю счет...");

      try {
        const response = await fetch("/api/requests", {
          method: "POST",
          body: formData
        });
        const result = await response.json();

        if (!response.ok || !result.ok) {
          throw new Error(result.error || "Не удалось отправить счет.");
        }

        setStatus(`Счет #${result.request_id} отправлен на согласование.`);
        form.reset();
        categoryButtons.forEach((item) => item.setAttribute("aria-pressed", "false"));

        if (tg) {
          tg.HapticFeedback && tg.HapticFeedback.notificationOccurred("success");
        }
      } catch (error) {
        setStatus(error.message, true);
        if (tg) {
          tg.HapticFeedback && tg.HapticFeedback.notificationOccurred("error");
        }
      } finally {
        submitButton.disabled = false;
        categoryButtons.forEach((button) => button.disabled = false);
      }
    });
  </script>
</body>
</html>
